apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: school-mgmt
    component: frontend
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: school-mgmt
    component: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: school-mgmt
    component: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: school-mgmt
      component: frontend
  template:
    metadata:
      labels:
        app: school-mgmt
        component: frontend
    spec:
      containers:
        - name: frontend
          image: school-mgmt/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: nginx-config
          configMap:
            name: school-config
            items:
              - key: nginx.conf
                path: nginx.conf
