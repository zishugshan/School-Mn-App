apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: school-mgmt
    component: backend
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: school-mgmt
    component: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: school-mgmt
    component: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: school-mgmt
      component: backend
  template:
    metadata:
      labels:
        app: school-mgmt
        component: backend
    spec:
      containers:
        - name: backend
          image: school-mgmt/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: school-config
            - secretRef:
                name: school-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
