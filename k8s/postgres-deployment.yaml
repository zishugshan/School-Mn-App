apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app: school-mgmt
    component: database
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: school-mgmt
    component: database
  clusterIP: None
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  labels:
    app: school-mgmt
    component: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels:
    app: school-mgmt
    component: database
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: school-mgmt
      component: database
  template:
    metadata:
      labels:
        app: school-mgmt
        component: database
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: school_mgmt
            - name: POSTGRES_USER
              value: school_admin
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: school-secrets
                  key: db-password
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - school_admin
                - -d
                - school_mgmt
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - school_admin
                - -d
                - school_mgmt
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
